<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css" class="css">
    <!--fontes LONDRINA e ANDIKA-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&family=Londrina+Solid:wght@100;300;400;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="cabecalho">
        <h1 >HORA DO QUIZ</h1>
    </header>
    <!--INÍCIO-->    
    <section class="container" id="inicial">
        <div class="card">
            <label for="jogador" class="texto-simples">Para começar, digite seu nome</label>
            <div class="subsessao-card">
                <input type="text" id="jogador">
                <span>
                    Será usado para ranking.
                </span>
            </div>
            <button type="button" id="btn-comecar" class="botao">Começar</button>
        </div>
    </section>
    <!--JOGO-->
    <section id="jogo" class="container hidden">
        <div class="card">
            <h3 id="texto-pergunta">Aqui ficarão as perguntas!</h3>
            <div id="alternativas" class="alternativas">
            </div>
        </div>
    </section>
    <!--PONTUAÇÃO-->
    <section id="placar" class="container hidden">
        <div class="card">
            <h2>⭐ PLACAR ⭐</h2> 
            <table class="tabela-placar">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Pontos</th>
                    </tr>
                </thead>
                <tbody id="corpo-ranking">

                </tbody>
            </table>
            <button type="button" id="btn-reiniciar" class="botao">Jogar Novamente</button>
        </div>
    </section>
    <!--FOOTER-->
    <footer class="footer">
        <p>© 2026 alanaOnTheShore</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
