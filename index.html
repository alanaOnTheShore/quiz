<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles.css" class="css">
    <!--fontes LONDRINA e ANDIKA-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&family=Londrina+Solid:wght@100;300;400;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="cabecalho">
        <h1 >HORA DO QUIZ</h1>
    </header>    
    <section class="container" id="inicial">
        <div class="card">
            <label for="inputNome" class="input">Para começar, digite seu nome</label>
            <div class="subsessao-card">
                <input type="text" id="inputNome">
                <span>
                    Será usado para ranking.
                </span>
            </div>
            <button type="button" id="btn-comecar" class="botao">Começar</button>
        </div>
    </section>
    <section id="jogo" class="container hidden">
        <div class="card">
            <h3 id="texto-perginta">Aqui ficarão as perguntas! 
                Vamos deixar o texto maior para simular o 
                comportamento em uma pergunta com mais linhas.</h3>
            <div id="alternativas" class="alternativas">
                <button type="button" class="botao-alternativas">Alternativa A</button>
                <button type="button" class="botao-alternativas">Alternativa B</button>
                <button type="button" class="botao-alternativas">Alternativa C</button>
                <button type="button" class="botao-alternativas">Alternativa D</button>
            </div>
    </div>
    </section>

    <!--FOOTER-->
    <footer class="footer">
        <p>© 2026 Alana Paola Silva Nascimento</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
